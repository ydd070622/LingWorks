<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>数据看板 - 日用量详情原型</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e8e8ed; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
.container { max-width:900px; margin:0 auto; padding:20px 24px 40px; }
/* Header */
.header { display:flex; align-items:center; gap:12px; padding:16px 0; margin-bottom:24px; border-bottom:1px solid rgba(255,255,255,0.08); }
.back-btn { display:flex; align-items:center; gap:4px; padding:6px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:rgba(255,255,255,0.5); cursor:pointer; font-size:13px; }
.back-btn:hover { background:rgba(255,255,255,0.06); color:#e8e8ed; }
.header-title { font-size:18px; font-weight:700; }
.date-nav { display:flex; align-items:center; gap:4px; margin-left:8px; }
.date-nav button { padding:4px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:rgba(255,255,255,0.5); cursor:pointer; font-size:12px; }
.date-nav button:hover { background:rgba(255,255,255,0.06); }
.date-nav span { font-size:13px; color:rgba(255,255,255,0.5); min-width:90px; text-align:center; }
.badge { font-size:11px; padding:2px 8px; border-radius:10px; background:rgba(99,102,241,0.12); color:#6366f1; font-weight:500; margin-left:auto; }
/* Stats */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.stat-box { background:rgba(255,255,255,0.03); border-radius:10px; padding:14px; text-align:center; }
.stat-val { font-size:20px; font-weight:700; }
.stat-label { font-size:11px; color:rgba(255,255,255,0.3); margin-top:4px; }
/* Card */
.card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:20px; margin-bottom:20px; }
.card-title { font-size:13px; font-weight:600; color:rgba(255,255,255,0.5); display:flex; align-items:center; gap:6px; margin-bottom:16px; justify-content:space-between; }
.legend { display:flex; gap:16px; font-size:11px; font-weight:400; }
.legend span { display:flex; align-items:center; gap:4px; }
.legend-dot { width:10px; height:10px; border-radius:2px; display:inline-block; }
/* Flash vs Pro bars */
.compare-bars { display:flex; align-items:flex-end; justify-content:center; gap:60px; padding:20px 0; height:220px; }
.bar-col { display:flex; flex-direction:column; align-items:center; gap:6px; }
.bar-col .val { font-size:14px; font-weight:700; }
.bar-col .bar { width:80px; border-radius:6px 6px 0 0; }
.bar-col .name { font-size:12px; font-weight:600; }
.bar-col .cost { font-size:14px; font-weight:700; }
/* Monthly chart */
.monthly-chart { display:flex; align-items:flex-end; gap:3px; height:160px; padding:0 4px; overflow-x:auto; }
.day-bar { flex:1 0 0; min-width:0; display:flex; flex-direction:column; align-items:center; gap:3px; height:100%; justify-content:flex-end; cursor:pointer; border-radius:4px 4px 0 0; }
.day-bar:hover { background:rgba(99,102,241,0.08); }
.day-bar .dval { font-size:10px; color:rgba(255,255,255,0.5); font-weight:600; white-space:nowrap; min-height:14px; }
.day-bar .dbar { width:100%; border-radius:4px 4px 0 0; min-height:0; }
.day-bar .dlabel { font-size:9px; font-weight:600; color:rgba(255,255,255,0.5); }
.day-bar.active .dbar { background:linear-gradient(180deg,#22c55e,rgba(34,197,94,0.1)) !important; }
.day-bar.active .dlabel { color:#22c55e; }
.fmtShort { color:rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <button class="back-btn">← 返回</button>
    <span class="header-title">📊 用量明细</span>
    <div class="date-nav">
      <button>◀ 前一天</button>
      <span>2026-06-10</span>
      <button>后一天 ▶</button>
    </div>
    <span class="badge">DeepSeek</span>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-box"><div class="stat-val">128.5K</div><div class="stat-label">当日总 Token</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#f59e0b">95.2K</div><div class="stat-label">V4 Flash</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#8b5cf6">33.3K</div><div class="stat-label">V4 Pro</div></div>
    <div class="stat-box"><div class="stat-val">¥0.38</div><div class="stat-label">当日消费</div></div>
  </div>

  <!-- Flash vs Pro (existing) -->
  <div class="card">
    <div class="card-title">
      <span>📊 Flash vs Pro 用量对比</span>
      <div class="legend">
        <span><span class="legend-dot" style="background:#f59e0b"></span> Flash</span>
        <span><span class="legend-dot" style="background:#8b5cf6"></span> Pro</span>
      </div>
    </div>
    <div class="compare-bars">
      <div class="bar-col">
        <span class="val" style="color:#f59e0b">95.2K</span>
        <div class="bar" style="height:150px; background:linear-gradient(180deg,#f59e0b,rgba(245,158,11,0.15))"></div>
        <span class="name" style="color:#f59e0b">V4 Flash</span>
        <span class="cost" style="color:#f59e0b">¥0.19</span>
      </div>
      <div class="bar-col">
        <span class="val" style="color:#8b5cf6">33.3K</span>
        <div class="bar" style="height:52px; background:linear-gradient(180deg,#8b5cf6,rgba(139,92,246,0.1))"></div>
        <span class="name" style="color:#8b5cf6">V4 Pro</span>
        <span class="cost" style="color:#8b5cf6">¥0.19</span>
      </div>
    </div>
  </div>

  <!-- NEW: Monthly daily token chart -->
  <div class="card">
    <div class="card-title">
      <span>📊 本月每日 Token 消耗</span>
      <span style="font-size:11px; color:rgba(255,255,255,0.3); font-weight:400">点击某天查看详情</span>
    </div>
    <div class="monthly-chart" id="monthlyChart"></div>
  </div>
</div>

<script>
const fmtShort = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(n);

// Simulated data for June 2026
const selectedDate = '2026-06-10';
const days = [];
for (let d = 1; d <= 10; d++) {
  const date = `2026-06-${String(d).padStart(2,'0')}`;
  const tokens = Math.floor(Math.random() * 200000) + 10000;
  days.push({ date, totalTokens: tokens });
}

const maxTokens = Math.max(...days.map(d => d.totalTokens), 1);
const chart = document.getElementById('monthlyChart');

days.forEach(d => {
  const isActive = d.date === selectedDate;
  const hasData = d.totalTokens > 0;
  const h = hasData ? Math.max(8, (d.totalTokens / maxTokens) * 130) : 0;
  const dayNum = new Date(d.date).getDate();
  const barBg = hasData
    ? (isActive ? 'linear-gradient(180deg,#22c55e,rgba(34,197,94,0.1))' : 'linear-gradient(180deg,#6366f1,rgba(99,102,241,0.1))')
    : '#2a2a3e';

  const el = document.createElement('div');
  el.className = 'day-bar' + (isActive ? ' active' : '');
  el.innerHTML = `
    <span class="dval">${hasData ? fmtShort(d.totalTokens) : ''}</span>
    <div class="dbar" style="height:${h}px; background:${barBg}"></div>
    <span class="dlabel">${dayNum}日</span>
  `;
  el.onclick = () => {
    document.querySelector('.date-nav span').textContent = d.date;
    // In real app, would switch to that day's detail
  };
  chart.appendChild(el);
});
</script>
</body>
</html>
