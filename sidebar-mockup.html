<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侧边栏切换 Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  .app {
    display: flex;
    height: 100vh;
  }

  /* ===== 可展开收起的面板 ===== */
  .demo-controls {
    position: fixed; top: 12px; right: 16px; z-index: 10;
  }
  .demo-controls button {
    background: #2a2a4a; color: #ccc; border: 1px solid #444;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .demo-controls button:hover { background: #3a3a5a; color: #fff; }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #14142b;
    border-right: 1px solid #2a2a4a;
    display: flex;
    flex-direction: column;
    transition: width 0.25s ease, opacity 0.25s ease;
    overflow: hidden;
    position: relative;
  }
  .sidebar.collapsed {
    width: 0;
    border-right-color: transparent;
    opacity: 0;
    pointer-events: none;
  }

  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 14px; border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }
  .sidebar-header h1 { font-size: 15px; color: #e8e8ff; white-space: nowrap; }

  .collapse-btn {
    background: none; border: none; color: #888; cursor: pointer;
    padding: 4px 6px; border-radius: 4px; display: flex; align-items: center;
    transition: color 0.15s;
  }
  .collapse-btn:hover { color: #fff; background: #2a2a4a; }

  .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer; white-space: nowrap;
    transition: background 0.1s; font-size: 13px;
  }
  .sidebar-item:hover { background: #1e1e38; }
  .sidebar-item.active { background: #2a2a5a; color: #fff; }
  .sidebar-item-icon { width: 20px; height: 20px; background: #333; border-radius: 4px; flex-shrink: 0; }
  .sidebar-section {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; font-size: 11px; color: #777;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sep { height: 1px; background: #2a2a4a; margin: 4px 10px; }

  /* ===== Floating toggle button (visible when sidebar hidden) ===== */
  .float-toggle {
    position: absolute;
    left: 0; top: 50%; transform: translateY(-50%);
    width: 28px; height: 60px;
    background: #1e1e3a; border: 1px solid #3a3a5a;
    border-radius: 0 8px 8px 0; border-left: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 5;
  }
  .float-toggle.visible {
    opacity: 0.85;
    pointer-events: auto;
  }
  .float-toggle:hover {
    opacity: 1;
    background: #2a2a5a;
  }
  .float-toggle svg {
    color: #aaa;
    width: 16px; height: 16px;
  }

  /* ===== Main Content ===== */
  .main-content {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a30;
    position: relative;
  }
  .main-content .placeholder {
    text-align: center; color: #555; font-size: 14px;
  }

  /* ===== Agent Panel (右侧) ===== */
  .agent-panel {
    width: 340px; flex-shrink: 0;
    background: #14142b; border-left: 1px solid #2a2a4a;
    display: flex; flex-direction: column;
    transition: width 0.25s ease;
    overflow: hidden;
  }
  .agent-panel-header {
    display: flex; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid #2a2a4a; font-size: 14px; font-weight: 600;
  }
  .agent-panel-body {
    flex: 1; padding: 16px; color: #666; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
<div class="demo-controls">
  <span style="color:#888;font-size:12px;margin-right:8px">模拟：</span>
  <button onclick="toggleCollapse()">切换侧边栏（点击按钮 或 左侧浮动条）</button>
</div>

<div class="app">
  <!-- 浮动展开按钮 -->
  <div class="float-toggle" id="floatToggle" title="展开侧边栏" onclick="toggleCollapse()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </div>

  <!-- 主侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>AI Web Tools</h1>
      <button class="collapse-btn" onclick="toggleCollapse()" title="收起侧栏">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section">🌐 常用网站</div>
      <div class="sidebar-item active"><div class="sidebar-item-icon"></div>ChatGPT</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>DeepSeek</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>Kimi</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>Gemini</div>
      <div class="sep"></div>
      <div class="sidebar-section">🖼️ 生图工具</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>文生图</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>图生图</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>生成历史</div>
      <div class="sep"></div>
      <div class="sidebar-section">📊 数据工具</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>开放平台</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>数据面板</div>
      <div class="sep"></div>
      <div class="sidebar-section">🔑 常用账号</div>
      <div class="sidebar-item"><div class="sidebar-item-icon"></div>账号管理</div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <div class="placeholder">
      <p>WebView 内容区</p>
      <p style="margin-top:4px;font-size:12px">侧边栏收起时，浮动按钮出现在左边缘 →</p>
    </div>
  </div>

  <!-- 智能体面板 -->
  <div class="agent-panel">
    <div class="agent-panel-header">🤖 智能体</div>
    <div class="agent-panel-body">Agent 对话区域</div>
  </div>
</div>

<script>
  const sidebar = document.getElementById('sidebar')
  const floatToggle = document.getElementById('floatToggle')
  let collapsed = false

  function toggleCollapse() {
    collapsed = !collapsed
    sidebar.classList.toggle('collapsed', collapsed)
    floatToggle.classList.toggle('visible', collapsed)
  }
</script>
</body>
</html>
