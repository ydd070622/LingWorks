<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM 工作流交互原型</title>
  <style>
    :root {
      --bg: #15161a;
      --panel: #1d1f25;
      --panel-2: #23262e;
      --line: #333743;
      --text: #eef2ff;
      --muted: #8b93a7;
      --accent: #818cf8;
      --blue: #60a5fa;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.45 "Microsoft YaHei", system-ui, sans-serif;
    }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 196px;
      border-right: 1px solid var(--line);
      background: #181a20;
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
    }
    .logo { display: flex; align-items: center; gap: 9px; padding: 6px 8px 14px; font-weight: 800; }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #22d3ee);
      display: grid; place-items: center;
    }
    .side-title { color: var(--muted); font-size: 11px; padding: 8px; }
    .nav-item, .sub-item {
      min-height: 32px;
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px;
      border-radius: 7px;
      color: #c7cedf;
      cursor: pointer;
      user-select: none;
    }
    .nav-item:hover, .sub-item:hover { background: var(--panel-2); color: var(--text); }
    .nav-item.active, .sub-item.active { background: rgba(129,140,248,.16); color: var(--text); }
    .sub-item { margin-left: 22px; font-size: 12px; }
    .badge {
      margin-left: auto;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 9px;
      display: inline-grid;
      place-items: center;
      font-size: 10px;
      font-weight: 800;
      background: #3b82f6;
      color: #fff;
    }
    .badge.green { background: #16a34a; }
    .badge.red { background: #dc2626; }
    .badge.gray { background: #4b5563; }
    .main { flex: 1; min-width: 0; padding: 18px; overflow: auto; }
    .toolbar {
      min-height: 42px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .search {
      width: 280px;
      border: 1px solid var(--line);
      background: #111318;
      color: var(--text);
      border-radius: 7px;
      padding: 8px 11px;
      outline: none;
    }
    .count { color: var(--muted); margin-left: auto; }
    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 7px;
      padding: 7px 11px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); color: #fff; }
    .primary { background: #6366f1; border-color: #6366f1; }
    .success { background: #15803d; border-color: #15803d; }
    .danger { background: rgba(239,68,68,.12); color: var(--red); border-color: rgba(239,68,68,.35); }
    .ghost { background: transparent; }
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 9px;
      overflow: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: center;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #171920;
      color: #b7bfd2;
      font-size: 12px;
      font-weight: 700;
    }
    tr:hover td { background: rgba(255,255,255,.025); }
    .left { text-align: left; }
    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, Consolas, monospace; color: #aeb7cc; }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(96,165,250,.15);
      color: var(--blue);
    }
    .tag.green { background: rgba(74,222,128,.12); color: var(--green); }
    .tag.yellow { background: rgba(251,191,36,.12); color: var(--yellow); }
    .tag.red { background: rgba(248,113,113,.12); color: var(--red); }
    .person { display: flex; align-items: center; gap: 8px; justify-content: flex-start; font-weight: 700; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #6366f1, #22d3ee);
      font-size: 12px;
    }
    .empty { padding: 48px; text-align: center; color: var(--muted); }
    .cards { display: grid; grid-template-columns: repeat(4, minmax(160px, 1fr)); gap: 12px; margin-bottom: 14px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .card-value { font-size: 24px; font-weight: 900; margin-top: 4px; }
    .flow {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: #cbd5e1;
    }
    .flow span {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 5px 10px;
    }
    .modal-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.62);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .modal {
      width: 480px;
      max-height: 86vh;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
    }
    .modal-head, .modal-foot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .modal-foot { border-bottom: 0; border-top: 1px solid var(--line); justify-content: flex-end; }
    .modal-title { font-weight: 800; font-size: 15px; }
    .modal-body { padding: 16px; display: grid; gap: 12px; }
    label { display: grid; gap: 5px; color: #b7bfd2; font-size: 12px; }
    input, select, textarea {
      border: 1px solid var(--line);
      background: #111318;
      color: var(--text);
      border-radius: 7px;
      padding: 8px 10px;
      font: inherit;
      outline: none;
    }
    textarea { min-height: 76px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(129,140,248,.16); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .notice {
      padding: 10px 12px;
      background: rgba(129,140,248,.1);
      border: 1px solid rgba(129,140,248,.24);
      border-radius: 8px;
      color: #c7d2fe;
    }
    .history {
      display: grid;
      gap: 8px;
      max-height: 180px;
      overflow: auto;
    }
    .history-item {
      padding: 9px 10px;
      border: 1px solid var(--line);
      background: #191b21;
      border-radius: 7px;
    }
    .history-date { color: var(--muted); font-size: 11px; margin-bottom: 3px; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><div class="logo-icon">L</div><div>客户管理</div></div>
      <div class="side-title">主菜单</div>
      <div id="nav"></div>
    </aside>
    <main class="main">
      <div class="flow">
        <span>客户管理</span>→<span>平面规划中</span>→<span>待约洽谈</span>→<span>合同 + 设计</span>→<span>施工</span>→<span>完工归档</span>
        <span>旁路：废弃方案</span>
      </div>
      <section id="page"></section>
    </main>
  </div>

  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle"></div>
        <button class="ghost" style="margin-left:auto" onclick="closeModal()">关闭</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <script>
    const today = () => new Date().toISOString().slice(0, 10)
    const state = {
      tab: 'customers',
      customers: [
        { id: 'c1', name: '张女士', city: '深圳', community: '华润城', area: '128㎡', style: '意式', owner: '守一意式', stage: 'customer', followDate: '2026-07-12', followNote: '已加微信，准备安排平面规划。' },
        { id: 'c2', name: '李先生', city: '广州', community: '珠江花园', area: '96㎡', style: '法式', owner: '守中法式', stage: 'customer', followDate: '2026-07-15', followNote: '预算明确，等户型图。' },
        { id: 'c3', name: '王女士', city: '深圳', community: '湾区壹号', area: '150㎡', style: '意式', owner: '守中意式', stage: 'closed', contractNo: 'P2026-018', amount: 42000, signDate: '2026-07-02', contractRemark: '合同备注：设计费分两期支付。', designRemark: '', designHistory: [] },
      ],
      projects: [
        { id: 'p1', customerId: 'c2', designer: '小林', startDate: '2026-07-08', endDate: '2026-07-13', status: 'planning', followDate: '2026-07-13', note: '方案一版制作中。' },
      ],
      manualDesignProjects: [],
      buildProjects: [],
      discarded: [],
      completed: [],
      contractArchived: [],
    }

    const navGroups = [
      { id: 'workbench', label: '工作台', icon: '▦' },
      { id: 'customers', label: '客户管理', icon: '👥' },
      { id: 'pre', label: '前期沟通', icon: '☎', children: [
        { id: 'planning', label: '平面规划中' },
        { id: 'meeting', label: '待约洽谈' },
      ]},
      { id: 'design', label: '设计阶段', icon: '✎', children: [
        { id: 'designOverview', label: '项目总览表' },
        { id: 'designProgress', label: '项目跟进表' },
      ]},
      { id: 'build', label: '施工阶段', icon: '🔧', children: [
        { id: 'buildOverview', label: '项目总览表' },
        { id: 'buildProgress', label: '进度管理表' },
      ]},
      { id: 'contracts', label: '合同管理', icon: '📄' },
      { id: 'archive', label: '归档中心', icon: '▣', children: [
        { id: 'customerArchive', label: '客户归档' },
        { id: 'discarded', label: '废弃方案' },
        { id: 'completed', label: '完工归档' },
        { id: 'contractArchive', label: '合同归档' },
      ]},
      { id: 'dashboard', label: '数据看板', icon: '📊' },
    ]

    function customer(id) { return state.customers.find(c => c.id === id) }
    function activeContracts() { return state.customers.filter(c => c.stage === 'closed' && !state.contractArchived.includes(c.id)) }
    function planningProjects() { return state.projects.filter(p => p.status === 'planning') }
    function meetingProjects() { return state.projects.filter(p => p.status === 'meeting' && customer(p.customerId)?.stage !== 'closed') }
    function counts(id) {
      const map = {
        customers: state.customers.filter(c => c.stage === 'customer' && !c.archived).length,
        planning: planningProjects().length,
        meeting: meetingProjects().length,
        pre: planningProjects().length + meetingProjects().length,
        design: activeContracts().length + state.manualDesignProjects.length,
        designOverview: activeContracts().length + state.manualDesignProjects.length,
        designProgress: activeContracts().length + state.manualDesignProjects.length,
        build: state.buildProjects.length,
        buildOverview: state.buildProjects.length,
        buildProgress: state.buildProjects.length,
        contracts: activeContracts().length,
        archive: state.customers.filter(c => c.archived).length + state.discarded.length + state.completed.length + state.contractArchived.length,
        customerArchive: state.customers.filter(c => c.archived).length,
        discarded: state.discarded.length,
        completed: state.completed.length,
        contractArchive: state.contractArchived.length,
        dashboard: 0,
      }
      return map[id] || 0
    }
    function go(tab) { state.tab = tab; render() }

    function renderNav() {
      const root = document.getElementById('nav')
      root.innerHTML = navGroups.map(g => {
        const active = state.tab === g.id || (g.children || []).some(c => c.id === state.tab)
        const badge = counts(g.id) ? `<span class="badge ${g.id === 'contracts' ? 'green' : ''}">${counts(g.id)}</span>` : ''
        const children = (g.children || []).map(c => {
          const cb = counts(c.id) ? `<span class="badge ${c.id.includes('discard') ? 'red' : 'gray'}">${counts(c.id)}</span>` : ''
          return `<div class="sub-item ${state.tab === c.id ? 'active' : ''}" onclick="go('${c.id}')"><span>${c.label}</span>${cb}</div>`
        }).join('')
        return `<div class="nav-item ${active ? 'active' : ''}" onclick="${g.children ? '' : `go('${g.id}')`}"><span>${g.icon}</span><span>${g.label}</span>${badge}</div>${children}`
      }).join('')
    }

    function render() {
      renderNav()
      const page = document.getElementById('page')
      const views = {
        workbench: renderWorkbench,
        customers: renderCustomers,
        planning: renderPlanning,
        meeting: renderMeeting,
        designOverview: renderDesignOverview,
        designProgress: renderDesignProgress,
        buildOverview: renderBuildOverview,
        buildProgress: renderBuildProgress,
        contracts: renderContracts,
        customerArchive: renderCustomerArchive,
        discarded: renderDiscarded,
        completed: renderCompleted,
        contractArchive: renderContractArchive,
        dashboard: renderDashboard,
      }
      page.innerHTML = (views[state.tab] || renderCustomers)()
    }

    function table(headers, rows, empty) {
      if (!rows.length) return `<div class="table-wrap"><div class="empty">${empty}</div></div>`
      return `<div class="table-wrap"><table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table></div>`
    }
    function personCell(c) {
      return `<div class="person"><span class="avatar">${c.name[0]}</span><span>${c.name}</span></div>`
    }
    function rowAction(label, fn, cls = '') {
      return `<button class="${cls}" onclick="${fn}">${label}</button>`
    }

    function renderWorkbench() {
      return `<div class="cards">
        <div class="card"><div class="muted">客户管理</div><div class="card-value">${counts('customers')}</div></div>
        <div class="card"><div class="muted">平面规划中</div><div class="card-value">${counts('planning')}</div></div>
        <div class="card"><div class="muted">待约洽谈</div><div class="card-value">${counts('meeting')}</div></div>
        <div class="card"><div class="muted">废弃方案</div><div class="card-value" style="color:var(--red)">${counts('discarded')}</div></div>
      </div>
      <div class="notice">这个原型模拟你现在 CRM 的主要路径。点击表格里的按钮，可以看到客户、方案、合同、设计、施工和归档的流转。</div>`
    }

    function renderDashboard() {
      const totalCustomers = state.customers.length
      const activeCustomers = state.customers.filter(c => c.stage === 'customer').length
      const signedContracts = state.customers.filter(c => c.stage === 'closed').length
      const revenue = state.customers.filter(c => c.stage === 'closed').reduce((sum, c) => sum + (c.amount || 0), 0)
      return `<div class="cards">
        <div class="card"><div class="muted">总客户</div><div class="card-value">${totalCustomers}</div></div>
        <div class="card"><div class="muted">未成交客户</div><div class="card-value">${activeCustomers}</div></div>
        <div class="card"><div class="muted">已签合同</div><div class="card-value" style="color:var(--green)">${signedContracts}</div></div>
        <div class="card"><div class="muted">合同金额</div><div class="card-value">¥${(revenue / 10000).toFixed(1)}万</div></div>
      </div>
      <div class="table-wrap">
        <div class="empty">数据看板占位：后期可以在这里放转化漏斗、成交额、设计/施工进度、废弃原因分析。</div>
      </div>`
    }

    function renderCustomers() {
      const rows = state.customers.filter(c => c.stage === 'customer' && !c.archived).map(c => `<tr>
        <td class="left">${personCell(c)}</td><td>${c.city}</td><td>${c.community}</td><td>${c.area}</td><td><span class="tag">${c.style}</span></td><td>${c.owner}</td><td>${c.followDate}</td><td class="left">${c.followNote}</td>
        <td>${rowAction('归档', `archiveCustomer('${c.id}')`, 'danger')}</td>
      </tr>`)
      return `<div class="toolbar"><button class="primary" onclick="openCustomerModal()">+ 添加客户</button><input class="search" placeholder="搜索客户..." /><span class="count">共 ${rows.length} 位客户</span></div>` +
        table(['客户', '地区', '小区', '面积', '喜欢风格', '客户归属', '跟进时间', '跟进情况', '操作'], rows, '暂无客户')
    }

    function renderPlanning() {
      const rows = planningProjects().map(p => {
        const c = customer(p.customerId)
        return `<tr>
          <td class="left">${personCell(c)}</td><td>${c.community}</td><td class="mono">${p.startDate}</td><td class="mono">${p.endDate}</td><td><span class="tag yellow">制作中</span></td><td>${p.designer}</td><td class="left">${p.note}</td>
          <td>${rowAction('确认完成', `completePlan('${p.id}')`, 'success')} ${rowAction('废弃方案', `openDiscardModal('${p.id}')`, 'danger')}</td>
        </tr>`
      })
      return `<div class="toolbar"><button class="primary" onclick="openProjectModal()">+ 新建项目</button><input class="search" placeholder="搜索客户、小区、设计师..." /><span class="count">共 ${rows.length} 个项目</span></div>` +
        table(['客户', '小区名称', '开始日期', '预估完成日期', '状态', '设计师', '跟进情况', '操作'], rows, '暂无平面规划项目')
    }

    function renderMeeting() {
      const rows = meetingProjects().map(p => {
        const c = customer(p.customerId)
        return `<tr>
          <td class="left">${personCell(c)}</td><td>${c.community}</td><td>${p.designer}</td><td class="mono">${p.completedDate}</td><td class="left">${p.note || '已约客户看方案'}</td>
          <td>${rowAction('合同签订', `openContractModal('${p.id}')`, 'success')} ${rowAction('退回规划', `backToPlanning('${p.id}')`)} ${rowAction('废弃方案', `openDiscardModal('${p.id}')`, 'danger')}</td>
        </tr>`
      })
      return `<div class="toolbar"><input class="search" placeholder="搜索客户、小区、设计师..." /><span class="count">共 ${rows.length} 个项目</span></div>` +
        table(['客户', '小区名称', '设计师', '确认完成日期', '跟进情况', '操作'], rows, '暂无待约洽谈项目')
    }

    function renderContracts() {
      const rows = activeContracts().map(c => `<tr>
        <td class="mono">${c.contractNo}</td><td class="left">${personCell(c)}</td><td><span class="tag green">已签约</span></td><td>¥${c.amount.toLocaleString()}</td><td class="mono">${c.signDate}</td>
        <td>${rowAction('合同归档', `archiveContract('${c.id}')`)}</td>
      </tr>`)
      return `<div class="toolbar"><span class="count">已签合同 ${rows.length} 份</span></div>` +
        table(['合同编号', '客户', '状态', '合同金额', '签约日期', '操作'], rows, '暂无成交合同')
    }

    function renderDesignOverview() {
      const rows = [
        ...activeContracts().map(c => ({ type: 'contract', customer: c, projectName: c.community || '设计项目', designer: '原方案设计师', signDate: c.signDate, planEndDate: '—', detail: c.designProjectDetail || '项目详情待补充' })),
        ...state.manualDesignProjects.map(p => ({ type: 'manual', manual: p, projectName: p.projectName, designer: p.designer, signDate: p.signDate, planEndDate: p.planEndDate || '—', detail: p.detail || '—' })),
      ].map(row => {
        const c = row.customer || customer(row.manual.customerId)
        return `<tr>
        <td>${row.projectName}</td><td class="left">${personCell(c)}</td><td>${row.designer}</td><td class="mono">${row.signDate}</td><td><span class="tag">${row.type === 'manual' ? '补录设计' : '设计中'}</span></td><td class="left">${row.detail}</td>
        <td>${rowAction('设计完成', `openBuildFromDesign('${c.id}')`, 'success')} ${rowAction('设计终止', `discardDesign('${c.id}')`, 'danger')}</td>
      </tr>`
      })
      return `<div class="toolbar"><button class="primary" onclick="openManualDesignModal()">+ 补录设计项目</button><input class="search" placeholder="搜索项目名称、业主、设计师..." /><span class="count">共 ${rows.length} 个设计项目</span></div>` +
        table(['项目名称', '业主', '设计师', '签约起始时间', '进度', '项目详情', '操作'], rows, '暂无设计项目')
    }

    function renderDesignProgress() {
      const rows = [
        ...activeContracts().map(c => ({ customer: c, projectName: c.community || '设计项目', designer: '原方案设计师', signDate: c.signDate, designRemark: c.designRemark || '—' })),
        ...state.manualDesignProjects.map(p => ({ customer: customer(p.customerId), projectName: p.projectName, designer: p.designer, signDate: p.signDate, designRemark: p.remark || '—' })),
      ].map(row => {
        const c = row.customer
        return `<tr>
        <td>${row.projectName}</td><td class="left">${personCell(c)}</td><td>${row.designer}</td><td class="mono">${row.signDate}</td><td class="left">深化平面与效果沟通</td><td class="left">${row.designRemark}</td>
        <td>${rowAction('备注', `openDesignRemark('${c.id}')`)} ${rowAction('进入施工', `openBuildFromDesign('${c.id}')`, 'success')}</td>
      </tr>`
      })
      return `<div class="toolbar"><button class="primary" onclick="openManualDesignModal()">+ 补录设计项目</button><input class="search" placeholder="搜索项目名称、业主、设计师..." /><span class="count">共 ${rows.length} 个项目</span></div>` +
        table(['项目名称', '业主', '设计师', '签约起始时间', '本周设计内容', '备注', '操作'], rows, '暂无设计进度项目')
    }

    function renderBuildOverview() {
      const rows = state.buildProjects.map(p => {
        const c = customer(p.customerId)
        return `<tr><td>${p.projectName}</td><td class="left">${personCell(c)}</td><td>${p.designer}</td><td class="mono">${p.signDate}</td><td class="mono">${p.planEndDate}</td><td><span class="tag yellow">施工中</span></td><td class="left">${p.detail || '—'}</td><td>${rowAction('完工归档', `finishBuild('${p.id}')`, 'success')}</td></tr>`
      })
      return `<div class="toolbar"><button class="primary" onclick="openBuildModal()">+ 新建施工项目</button><button onclick="openManualBuildModal()">+ 补录施工项目</button><input class="search" placeholder="搜索项目名称、业主..." /><span class="count">共 ${rows.length} 个项目</span></div>` +
        table(['项目名称', '业主', '设计师', '签约起始时间', '计划完成时间', '进度', '项目详情', '操作'], rows, '暂无施工项目')
    }

    function renderBuildProgress() {
      const rows = state.buildProjects.map(p => {
        const c = customer(p.customerId)
        return `<tr><td>${p.projectName}</td><td class="left">${personCell(c)}</td><td>${p.designer}</td><td class="mono">${p.signDate}</td><td class="left">${p.thisWeekWork || '水电定位'}</td><td class="left">${p.materials || '瓷砖确认'}</td><td class="left">${p.issues || '—'}</td><td class="left">${p.nextPlan || '木作复尺'}</td><td class="mono">${p.planEndDate}</td><td class="left">${p.remark || '—'}</td><td>${rowAction('完工归档', `finishBuild('${p.id}')`, 'success')}</td></tr>`
      })
      return `<div class="toolbar"><button onclick="openManualBuildModal()">+ 补录施工项目</button><input class="search" placeholder="搜索项目名称、业主、设计师..." /><span class="count">共 ${rows.length} 个项目</span></div>` +
        table(['项目名称', '业主', '设计师', '签约起始时间', '本周施工内容', '本周主材进场', '本周遗留问题', '下周计划施工内容', '计划完成时间', '备注', '操作'], rows, '暂无施工进度项目')
    }

    function renderDiscarded() {
      const rows = state.discarded.map(d => {
        const c = customer(d.customerId)
        return `<tr><td><span class="tag red">${d.from}</span></td><td class="left">${personCell(c)}</td><td>${c.community}</td><td>${d.reason}</td><td class="left">${d.note}</td><td class="mono">${d.date}</td><td>${rowAction('恢复到待约洽谈', `restoreDiscard('${d.id}')`)}</td></tr>`
      })
      return `<div class="toolbar"><span class="count">共 ${rows.length} 个废弃方案</span></div>` +
        table(['来源阶段', '客户', '小区', '废弃原因', '备注', '废弃日期', '操作'], rows, '暂无废弃方案')
    }

    function renderCustomerArchive() {
      const rows = state.customers.filter(c => c.archived).map(c => `<tr>
        <td><span class="tag red">${c.stage === 'closed' ? '已完成' : '无效'}</span></td>
        <td class="left">${personCell(c)}</td>
        <td>${c.city || '—'}</td>
        <td>${c.community || '—'}</td>
        <td>${c.area || '—'}</td>
        <td><span class="tag">${c.style || '—'}</span></td>
        <td>${c.owner || '—'}</td>
        <td>${c.followDate || '—'}</td>
        <td class="left">${c.followNote || '—'}</td>
        <td>${rowAction('退档', `restoreCustomer('${c.id}')`)}</td>
      </tr>`)
      return `<div class="toolbar"><span class="count">共 ${rows.length} 位归档客户</span></div>` +
        table(['分类', '客户', '地区', '小区名称', '房子面积', '喜欢风格', '客户归属', '跟进时间', '跟进情况', '操作'], rows, '暂无客户归档')
    }

    function renderCompleted() {
      const rows = state.completed.map(d => {
        const c = customer(d.customerId)
        return `<tr><td>${d.projectName}</td><td class="left">${personCell(c)}</td><td>${d.designer}</td><td class="mono">${d.finishDate}</td><td class="left">${d.remark || '—'}</td></tr>`
      })
      return `<div class="toolbar"><span class="count">共 ${rows.length} 个完工项目</span></div>` +
        table(['项目名称', '业主', '设计师', '完工日期', '备注'], rows, '暂无完工归档项目')
    }

    function renderContractArchive() {
      const rows = state.contractArchived.map(id => customer(id)).filter(Boolean).map(c => `<tr><td>${c.contractNo}</td><td class="left">${personCell(c)}</td><td>¥${c.amount.toLocaleString()}</td><td class="left">${c.contractRemark || '—'}</td><td>${rowAction('恢复合同', `restoreContract('${c.id}')`)}</td></tr>`)
      return `<div class="toolbar"><span class="count">共 ${rows.length} 份归档合同</span></div>` +
        table(['合同编号', '客户', '合同金额', '合同备注', '操作'], rows, '暂无合同归档')
    }

    function openModal(title, body, foot) {
      document.getElementById('modalTitle').textContent = title
      document.getElementById('modalBody').innerHTML = body
      document.getElementById('modalFoot').innerHTML = foot
      document.getElementById('modalMask').style.display = 'flex'
      const first = document.querySelector('#modalBody input, #modalBody textarea, #modalBody select')
      if (first) setTimeout(() => first.focus(), 0)
    }
    function closeModal() { document.getElementById('modalMask').style.display = 'none' }

    function openCustomerModal() {
      openModal('添加客户', `
        <div class="grid2"><label>业主姓名<input id="mName" value="陈女士"></label><label>地区<input id="mCity" value="深圳"></label></div>
        <div class="grid2"><label>小区<input id="mCommunity" value="星河湾"></label><label>面积<input id="mArea" value="118㎡"></label></div>
        <div class="grid2"><label>喜欢风格<select id="mStyle"><option>意式</option><option>法式</option></select></label><label>客户归属<select id="mOwner"><option>守一意式</option><option>守中意式</option><option>守中法式</option></select></label></div>
        <label>跟进情况<textarea id="mNote">新客户，准备沟通户型需求。</textarea></label>
      `, `<button onclick="closeModal()">取消</button><button class="primary" onclick="addCustomer()">保存客户</button>`)
    }
    function addCustomer() {
      state.customers.push({ id: 'c' + Date.now(), name: val('mName'), city: val('mCity'), community: val('mCommunity'), area: val('mArea'), style: val('mStyle'), owner: val('mOwner'), stage: 'customer', followDate: today(), followNote: val('mNote') })
      closeModal(); render()
    }
    function archiveCustomer(customerId) {
      const c = customer(customerId)
      c.archived = true
      go('customerArchive')
    }
    function restoreCustomer(customerId) {
      const c = customer(customerId)
      c.archived = false
      go('customers')
    }

    function openProjectModal() {
      const options = state.customers.filter(c => c.stage === 'customer' && !state.projects.some(p => p.customerId === c.id && p.status !== 'discarded')).map(c => `<option value="${c.id}">${c.name} · ${c.community}</option>`).join('')
      openModal('平面规划中新建项目', `
        <label>客户<select id="mCustomer">${options}</select></label>
        <div class="grid2"><label>开始日期<input id="mStart" type="date" value="${today()}"></label><label>预估完成日期<input id="mEnd" type="date" value="${today()}"></label></div>
        <label>设计师<select id="mDesigner"><option>小林</option><option>小周</option><option>阿青</option></select></label>
        <label>跟进情况<textarea id="mProjectNote">已创建平面规划项目。</textarea></label>
      `, `<button onclick="closeModal()">取消</button><button class="primary" onclick="addProject()">确认创建</button>`)
    }
    function addProject() {
      state.projects.push({ id: 'p' + Date.now(), customerId: val('mCustomer'), designer: val('mDesigner'), startDate: val('mStart'), endDate: val('mEnd'), status: 'planning', note: val('mProjectNote') })
      closeModal(); go('planning')
    }
    function completePlan(id) {
      const p = state.projects.find(p => p.id === id)
      p.status = 'meeting'
      p.completedDate = today()
      p.note = '方案已完成，待约业主见面洽谈。'
      go('meeting')
    }
    function backToPlanning(id) {
      const p = state.projects.find(p => p.id === id)
      p.status = 'planning'
      p.completedDate = ''
      p.note = '从待约洽谈退回继续调整方案。'
      go('planning')
    }

    function openContractModal(projectId) {
      const p = state.projects.find(p => p.id === projectId)
      const c = customer(p.customerId)
      openModal('新增合同', `
        <div class="notice">已关联客户：${c.name} · ${c.community}</div>
        <div class="grid2"><label>合同编号<input id="mContractNo" value="P2026-${String(Date.now()).slice(-3)}"></label><label>合同金额<input id="mAmount" type="number" value="38000"></label></div>
        <label>合同备注<textarea id="mContractRemark">这里是合同归档才查看的合同备注。</textarea></label>
      `, `<button onclick="closeModal()">取消</button><button class="primary" onclick="signContract('${projectId}')">保存合同</button>`)
    }
    function signContract(projectId) {
      const p = state.projects.find(p => p.id === projectId)
      const c = customer(p.customerId)
      c.stage = 'closed'
      c.contractNo = val('mContractNo')
      c.amount = Number(val('mAmount')) || 0
      c.signDate = today()
      c.contractRemark = val('mContractRemark')
      closeModal()
      go('designOverview')
    }

    function openDesignRemark(customerId) {
      const c = customer(customerId)
      openModal('设计项目备注', `
        <label>本次备注<textarea id="mDesignRemark">${c.designRemark || ''}</textarea></label>
        <div class="history">${(c.designHistory || []).slice().reverse().map(h => `<div class="history-item"><div class="history-date">${h.date}</div>${h.text}</div>`).join('') || '<div class="muted">暂无历史备注</div>'}</div>
      `, `<button onclick="closeModal()">取消</button><button class="primary" onclick="saveDesignRemark('${customerId}')">保存备注</button>`)
    }

    function openManualDesignModal() {
      openModal('补录设计项目', `
        <div class="notice">适合历史遗留项目：不需要从客户管理和平面规划重新走一遍，保存后直接出现在设计阶段。</div>
        <label>项目名称<input id="mManualDesignProject" value="星河湾设计项目"></label>
        <div class="grid2"><label>业主姓名<input id="mManualDesignName" value="赵女士"></label><label>业主电话<input id="mManualDesignPhone" value="13800000000"></label></div>
        <div class="grid2"><label>小区名称<input id="mManualDesignCommunity" value="星河湾"></label><label>面积<input id="mManualDesignArea" value="118㎡"></label></div>
        <div class="grid2"><label>设计师<select id="mManualDesignDesigner"><option>小林</option><option>小周</option><option>阿青</option></select></label><label>签约起始时间<input id="mManualDesignSign" type="date" value="${today()}"></label></div>
        <label>计划完成时间<input id="mManualDesignEnd" type="date" value="${today()}"></label>
        <label>项目详情<textarea id="mManualDesignDetail">历史项目补录，当前处于设计阶段。</textarea></label>
        <label>备注<textarea id="mManualDesignRemark">补录来源：线下历史项目。</textarea></label>
      `, `<button onclick="closeModal()">取消</button><button class="primary" onclick="addManualDesign()">保存补录</button>`)
    }
    function addManualDesign() {
      const cid = 'c' + Date.now()
      state.customers.push({
        id: cid,
        name: val('mManualDesignName'),
        phone: val('mManualDesignPhone'),
        city: '',
        community: val('mManualDesignCommunity'),
        area: val('mManualDesignArea'),
        style: '',
        owner: '手动补录',
        stage: 'closed',
        signDate: val('mManualDesignSign'),
        contractNo: '补录-' + String(Date.now()).slice(-4),
        amount: 0,
        contractRemark: '手动补录设计项目',
        designProjectDetail: val('mManualDesignDetail'),
        designRemark: val('mManualDesignRemark'),
        designHistory: [{ date: today(), text: val('mManualDesignRemark') }],
        manualSource: 'design',
      })
      state.manualDesignProjects.push({
        id: 'md' + Date.now(),
        customerId: cid,
        projectName: val('mManualDesignProject'),
        designer: val('mManualDesignDesigner'),
        signDate: val('mManualDesignSign'),
        planEndDate: val('mManualDesignEnd'),
        detail: val('mManualDesignDetail'),
        remark: val('mManualDesignRemark'),
      })
      closeModal()
      go('designOverview')
    }
    function saveDesignRemark(customerId) {
      const c = customer(customerId)
      const text = val('mDesignRemark')
      c.designRemark = text
      c.designHistory = c.designHistory || []
      c.designHistory.push({ date: today(), text })
      closeModal(); render()
    }
    function openBuildFromDesign(customerId) {
      const c = customer(customerId)
      openModal('设计完成，进入施工', `
        <div class="notice">将 ${c.name} 的设计项目转入施工阶段。</div>
        <label>施工项目名称<input id="mBuildName" value="${c.community || c.name + '宅'}·施工"></label>
        <div class="grid2"><label>施工负责人<select id="mBuildDesigner"><option>小林</option><option>小周</option><option>阿青</option></select></label><label>计划完成时间<input id="mBuildEnd" type="date" value="${today()}"></label></div>
        <label>项目详情<textarea id="mBuildDetail">由设计阶段转入施工。</textarea></label>
      `, `<button onclick="closeModal()">取消</button><button class="primary" onclick="addBuildFromDesign('${customerId}')">进入施工</button>`)
    }
    function addBuildFromDesign(customerId) {
      if (!state.buildProjects.some(p => p.customerId === customerId)) {
        state.buildProjects.push({ id: 'b' + Date.now(), customerId, projectName: val('mBuildName'), designer: val('mBuildDesigner'), signDate: today(), planEndDate: val('mBuildEnd'), detail: val('mBuildDetail') })
      }
      closeModal(); go('buildOverview')
    }

    function openBuildModal() {
      const options = activeContracts().map(c => `<option value="${c.id}">${c.name} · ${c.community}</option>`).join('')
      openModal('新建施工项目', `
        <label>业主<select id="mBuildCustomer">${options}</select></label>
        <label>项目名称<input id="mBuildName" value="施工项目"></label>
        <div class="grid2"><label>施工负责人<select id="mBuildDesigner"><option>小林</option><option>小周</option><option>阿青</option></select></label><label>计划完成时间<input id="mBuildEnd" type="date" value="${today()}"></label></div>
      `, `<button onclick="closeModal()">取消</button><button class="primary" onclick="addBuildManual()">确认创建</button>`)
    }
    function addBuildManual() {
      state.buildProjects.push({ id: 'b' + Date.now(), customerId: val('mBuildCustomer'), projectName: val('mBuildName'), designer: val('mBuildDesigner'), signDate: today(), planEndDate: val('mBuildEnd'), detail: '手动新建施工项目' })
      closeModal(); render()
    }

    function openManualBuildModal() {
      openModal('补录施工项目', `
        <div class="notice">适合已经在线下进入施工的历史项目。保存后会自动补一个业主记录，并直接创建施工项目。</div>
        <label>项目名称<input id="mManualBuildProject" value="云玺花园施工项目"></label>
        <div class="grid2"><label>业主姓名<input id="mManualBuildName" value="钱先生"></label><label>业主电话<input id="mManualBuildPhone" value="13900000000"></label></div>
        <div class="grid2"><label>小区名称<input id="mManualBuildCommunity" value="云玺花园"></label><label>面积<input id="mManualBuildArea" value="140㎡"></label></div>
        <div class="grid2"><label>施工负责人<select id="mManualBuildDesigner"><option>小林</option><option>小周</option><option>阿青</option></select></label><label>签约起始时间<input id="mManualBuildSign" type="date" value="${today()}"></label></div>
        <label>计划完成时间<input id="mManualBuildEnd" type="date" value="${today()}"></label>
        <label>本周施工内容<textarea id="mManualBuildWork">水电定位与材料确认。</textarea></label>
        <label>本周主材进场<textarea id="mManualBuildMaterials">瓷砖、地漏待确认。</textarea></label>
        <label>本周遗留问题<textarea id="mManualBuildIssues">待业主确认开关点位。</textarea></label>
        <label>下周计划施工内容<textarea id="mManualBuildNext">木作复尺，推进泥工。</textarea></label>
        <label>备注<textarea id="mManualBuildRemark">补录来源：线下施工项目。</textarea></label>
      `, `<button onclick="closeModal()">取消</button><button class="primary" onclick="addManualBuild()">保存补录</button>`)
    }
    function addManualBuild() {
      const cid = 'c' + Date.now()
      state.customers.push({
        id: cid,
        name: val('mManualBuildName'),
        phone: val('mManualBuildPhone'),
        city: '',
        community: val('mManualBuildCommunity'),
        area: val('mManualBuildArea'),
        style: '',
        owner: '手动补录',
        stage: 'closed',
        signDate: val('mManualBuildSign'),
        contractNo: '补录-' + String(Date.now()).slice(-4),
        amount: 0,
        contractRemark: '手动补录施工项目',
        manualSource: 'build',
      })
      state.buildProjects.push({
        id: 'b' + Date.now(),
        customerId: cid,
        projectName: val('mManualBuildProject'),
        designer: val('mManualBuildDesigner'),
        signDate: val('mManualBuildSign'),
        planEndDate: val('mManualBuildEnd'),
        detail: val('mManualBuildRemark'),
        thisWeekWork: val('mManualBuildWork'),
        materials: val('mManualBuildMaterials'),
        issues: val('mManualBuildIssues'),
        nextPlan: val('mManualBuildNext'),
        remark: val('mManualBuildRemark'),
      })
      closeModal()
      go('buildOverview')
    }
    function finishBuild(id) {
      const idx = state.buildProjects.findIndex(p => p.id === id)
      if (idx < 0) return
      const p = state.buildProjects[idx]
      state.completed.push({ ...p, finishDate: today(), remark: '项目已完工归档。' })
      state.buildProjects.splice(idx, 1)
      go('completed')
    }

    function openDiscardModal(projectId) {
      const p = state.projects.find(p => p.id === projectId)
      const c = customer(p.customerId)
      openModal('废弃方案归档', `
        <div class="notice">废弃的是方案/项目，不一定等于客户永久无效。后续可从废弃方案里恢复。</div>
        <label>客户<input value="${c.name} · ${c.community}" disabled></label>
        <label>废弃原因<select id="mDiscardReason"><option>业主一直不来</option><option>客户直接拒绝</option><option>预算不合适</option><option>方案不满意</option><option>其他</option></select></label>
        <label>废弃备注<textarea id="mDiscardNote">记录为什么废弃，以及后续是否还有机会。</textarea></label>
      `, `<button onclick="closeModal()">取消</button><button class="danger" onclick="discardProject('${projectId}')">确认废弃</button>`)
    }
    function discardProject(projectId) {
      const idx = state.projects.findIndex(p => p.id === projectId)
      if (idx < 0) return
      const p = state.projects[idx]
      state.discarded.push({ id: 'd' + Date.now(), projectId, customerId: p.customerId, from: p.status === 'meeting' ? '待约洽谈' : '平面规划中', reason: val('mDiscardReason'), note: val('mDiscardNote'), date: today(), project: { ...p } })
      state.projects.splice(idx, 1)
      closeModal(); go('discarded')
    }
    function discardDesign(customerId) {
      const c = customer(customerId)
      state.discarded.push({ id: 'd' + Date.now(), customerId, from: '设计阶段', reason: '设计终止', note: '签约后设计阶段终止，保留记录。', date: today(), project: null })
      state.contractArchived.push(customerId)
      go('discarded')
    }
    function restoreDiscard(id) {
      const idx = state.discarded.findIndex(d => d.id === id)
      if (idx < 0) return
      const d = state.discarded[idx]
      if (d.project) state.projects.push({ ...d.project, status: 'meeting' })
      state.discarded.splice(idx, 1)
      go('meeting')
    }
    function archiveContract(customerId) { state.contractArchived.push(customerId); go('contractArchive') }
    function restoreContract(customerId) { state.contractArchived = state.contractArchived.filter(id => id !== customerId); go('contracts') }
    function val(id) { return document.getElementById(id)?.value || '' }

    render()
  </script>
</body>
</html>
