<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侧边栏切换 Mockup v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  .app {
    display: flex;
    height: 100vh;
    position: relative;
  }

  /* ===== Demo Controls ===== */
  .demo-controls {
    position: fixed; top: 12px; right: 16px; z-index: 100;
  }
  .demo-controls button {
    background: #2a2a4a; color: #ccc; border: 1px solid #444;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .demo-controls button:hover { background: #3a3a5a; color: #fff; }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #14142b;
    border-right: 1px solid #2a2a4a;
    display: flex;
    flex-direction: column;
    transition: width 0.25s ease, border-color 0.25s ease;
    overflow: hidden;
    position: relative;
    z-index: 2;
  }
  .sidebar.collapsed {
    width: 0;
    min-width: 0;
    border-right-color: transparent;
  }

  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 14px; border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }
  .sidebar-header h1 { font-size: 15px; color: #e8e8ff; white-space: nowrap; }

  .sidebar-header-left { display: flex; align-items: center; gap: 8px; }

  /* Collapse button inside sidebar header */
  .collapse-btn {
    background: none; border: none; color: #888; cursor: pointer;
    padding: 4px 6px; border-radius: 4px; display: flex; align-items: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .collapse-btn:hover { color: #fff; background: #2a2a4a; }

  .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer; white-space: nowrap;
    transition: background 0.1s; font-size: 13px;
  }
  .sidebar-item:hover { background: #1e1e38; }
  .sidebar-item.active { background: #2a2a5a; color: #fff; }
  .sidebar-item-icon { width: 20px; height: 20px; background: #333; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .sidebar-section {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; font-size: 11px; color: #777;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sep { height: 1px; background: #2a2a4a; margin: 4px 10px; }

  .sidebar-footer {
    border-top: 1px solid #2a2a4a; padding: 8px;
    display: flex; align-items: center; gap: 4px;
  }
  .sidebar-footer button {
    background: none; border: none; color: #888; cursor: pointer;
    padding: 6px 8px; border-radius: 6px; font-size: 14px; display: flex;
  }
  .sidebar-footer button:hover { color: #fff; background: #1e1e38; }

  /* ===== Floating toggle tab (Claude/Codex style) ===== */
  .float-tab {
    position: absolute;
    left: 0; top: 14px;
    width: 36px; height: 36px;
    background: #1e1e3a;
    border: 1px solid #3a3a5a;
    border-left: none;
    border-radius: 0 10px 10px 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, background 0.15s;
    z-index: 10;
    box-shadow: 2px 0 12px rgba(0,0,0,0.3);
  }
  .float-tab.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .float-tab:hover {
    background: #2a2a5a;
    border-color: #4a4a7a;
  }
  .float-tab svg {
    color: #aaa;
    width: 18px; height: 18px;
  }
  .float-tab:hover svg {
    color: #fff;
  }

  /* ===== Main Content ===== */
  .main-content {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a30;
    position: relative;
  }
  .main-content .placeholder {
    text-align: center; color: #555; font-size: 14px;
  }

  /* ===== Agent Panel (右侧) ===== */
  .agent-panel {
    width: 340px; flex-shrink: 0;
    background: #14142b; border-left: 1px solid #2a2a4a;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .agent-panel-header {
    display: flex; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid #2a2a4a; font-size: 14px; font-weight: 600;
  }
  .agent-panel-body {
    flex: 1; padding: 16px; color: #666; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
<div class="demo-controls">
  <span style="color:#888;font-size:12px;margin-right:8px">点击测试：</span>
  <button onclick="toggleCollapse()">切换侧边栏</button>
</div>

<div class="app">
  <!-- 浮动展开方块（Claude/Codex 风格 - 侧边栏面板图标） -->
  <div class="float-tab" id="floatTab" onclick="toggleCollapse()" title="展开侧边栏">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="18" rx="1"/>
      <rect x="14" y="3" width="7" height="18" rx="1"/>
    </svg>
  </div>

  <!-- 主侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-left">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#a78bfa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <h1>AI Web Tools</h1>
      </div>
      <button class="collapse-btn" onclick="toggleCollapse()" title="收起侧栏">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section">🌐 常用网站</div>
      <div class="sidebar-item active"><div class="sidebar-item-icon">CG</div>ChatGPT</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">DS</div>DeepSeek</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">KM</div>Kimi</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">GM</div>Gemini</div>
      <div class="sep"></div>
      <div class="sidebar-section">🖼️ 生图工具</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">✏️</div>文生图</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">🖼️</div>图生图</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">📋</div>生成历史</div>
      <div class="sep"></div>
      <div class="sidebar-section">📊 数据工具</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">🔗</div>开放平台</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">📊</div>数据面板</div>
      <div class="sep"></div>
      <div class="sidebar-section">🔑 常用账号</div>
      <div class="sidebar-item"><div class="sidebar-item-icon">👤</div>账号管理</div>
    </div>
    <div class="sidebar-footer">
      <button title="下载">📥</button>
      <button title="切换主题">🌙</button>
      <button title="设置">⚙️</button>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <div class="placeholder">
      <p>WebView 内容区</p>
      <p style="margin-top:6px;font-size:12px">
        侧边栏收起后，左上角出现方块按钮 ↑
      </p>
      <p style="margin-top:4px;font-size:11px;color:#444">
        (类似 Claude / Cursor 的侧边栏样式)
      </p>
    </div>
  </div>

  <!-- 智能体面板 -->
  <div class="agent-panel">
    <div class="agent-panel-header">🤖 智能体</div>
    <div class="agent-panel-body">Agent 对话区域</div>
  </div>
</div>

<script>
  const sidebar = document.getElementById('sidebar')
  const floatTab = document.getElementById('floatTab')
  let collapsed = false

  function toggleCollapse() {
    collapsed = !collapsed
    sidebar.classList.toggle('collapsed', collapsed)
    floatTab.classList.toggle('visible', collapsed)
  }
</script>
</body>
</html>
