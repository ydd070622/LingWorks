name: Sync to Gitee

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://ydd070622:${{ secrets.GITEE_TOKEN }}@gitee.com/ydd070622/ai-web-tools.git
          git push gitee master --force
